# Define your filter criteria in a "config.yml" file in the root of the project.
#
# Filters as a whole are white-listing, so if a requisition meets any of the filters (not necessarily all of them),
# it is included in the eligible requisition list.
#
# Below are examples of valid (arbitrary) filters; put basic and detailed filter criteria together in every filter object.
# Use YAML data types for filter criteria values, these will be parsed by to Python types at runtime.
#
# You may specify as many or as little filters as you need, 
# and you may include or exclude any filter criteria in your filters as well. All criteria are optional;
# filters may have basic-only or detailed-only criteria, or a mix of both.


filters:
  # Filter 1
    # Basic filter criteria
  - minimum_risk_grade: "A1"
    maximum_risk_grade: "B7"
    minimum_score: 699
    maximum_score: 701
    minimum_interest_rate: 0.1
    maximum_interest_rate: 0.2
    destination_whitelist: ["Automóvil", "Vivienda"]
    destination_blacklist: ["Pagar Deudas", "Otros"]
    minimum_term: 12
    maximum_term: 36
    minimum_amount: 200000.0
    maximum_amount: 400000.0
    minimum_remaining_funding_amount: 5000.0
    maximum_remaining_funding_amount: 10000.0
    minimum_loan_number: 1
    maximum_loan_number: 5
    # Detailed filter criteria (skipped some maximum/minimum and whitelist/blacklist criteria pairs for brevity)
    maximum_monthly_payment: 10000.0
    minimum_credit_history_length: 5
    maximum_credit_history_inquiries: 10
    maximum_opened_accounts: 8
    minimum_total_income: 30000.0
    maximum_total_expenses: 15000.0
    minimum_age: 30
    maximum_dependents: 3
    has_major_medical_insurance: true
    has_own_vehicle: true
    minimum_education: "Profesional"
    housing_whitelist: ["Propietario", "Rentada"]
    is_occupation_empty: false
    minimum_tenure: 3
    occupation_type_whitelist: ["Empleado"]
    is_platform_in_shareholder_list: true
  # Filter 2
  - maximum_risk_grade: "B2"
    minimum_interest_rate: 0.15
